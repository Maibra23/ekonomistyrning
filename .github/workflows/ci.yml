name: CI

# Triggers: every push on any branch, plus pull requests targeting main.
on:
  push:
  pull_request:
    branches:
      - main

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    # fail-fast: false on the matrix strategy so all matrix entries run
    # to completion even if one fails. Kept as a single-version matrix
    # to express the spec intent (job level fail-fast: false).
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Upgrade pip
        run: pip install --upgrade pip

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Install pytest-cov
        run: pip install pytest-cov

      - name: Run pytest with coverage
        run: pytest tests/ -v --cov=utils --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
